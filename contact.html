<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt - plojharsim</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">plojharsim</a>
            <button class="nav-toggle">☰</button>
            <ul class="nav-links">
                <li><a href="index.html#about">O mně</a></li>
                <li><a href="projects.html">Projekty</a></li>
                <li><a href="index.html#skills">Dovednosti</a></li>
                <li><a href="contact.html">Kontakt</a></li>
            </ul>
        </div>
    </nav>

    <section class="contact" id="contact">
        <div class="contact-container">
            <h2>Kontaktuj mě</h2>
            <p>Máš otázku nebo chceš spolupracovat? Napiš mi!</p>
            <form class="contact-form">
                <input type="text" placeholder="Jméno" required>
                <input type="email" placeholder="E-mail" required>
                <textarea placeholder="Tvoje zpráva" rows="5" required></textarea>
                <button type="submit" class="cta-button">Odeslat</button>
            </form>
            <div class="contact-info">
                <p>E-mail: <a href="mailto:plojharsim@gmail.com">plojharsim@gmail.com</a></p>
                <p>GitHub: <a href="https://github.com/plojharsim" target="_blank">github.com/plojharsim</a></p>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-container">
            <div class="footer-brand">
                <h3>plojharsim</h3>
                <p>© 2025 Šimon Plojhar</p>
            </div>
            <div class="footer-links">
                <h4>Navigace</h4>
                <ul>
                    <li><a href="index.html#about">O mně</a></li>
                    <li><a href="projects.html">Projekty</a></li>
                    <li><a href="index.html#skills">Dovednosti</a></li>
                    <li><a href="contact.html">Kontakt</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
